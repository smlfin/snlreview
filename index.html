<!DOCTYPE html>
<html lang="en">
<head>
  <title>Branch Review Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f2f8;
      --surf:      #ffffff;
      --surf2:     #f7f8fc;
      --surf3:     #eef0f7;
      --border:    rgba(60,80,160,0.13);
      --border2:   rgba(60,80,160,0.22);
      --navy:      #1e3a8a;
      --navy2:     #2d4db0;
      --navy3:     #3b5ec4;
      --text:      #0f172a;
      --text2:     #475569;
      --text3:     #94a3b8;
      --green:     #166534;
      --green-l:   #dcfce7;
      --green-b:   #86efac;
      --amber:     #92400e;
      --amber-l:   #fef3c7;
      --amber-b:   #fcd34d;
      --red:       #991b1b;
      --red-l:     #fee2e2;
      --red-b:     #fca5a5;
      --blue:      #1e40af;
      --blue-l:    #dbeafe;
      --blue-b:    #93c5fd;
      /* RD teal */
      --teal:      #0f766e;
      --teal-l:    #ccfbf1;
      --teal-b:    #5eead4;
      --r:         14px;
      --r-sm:      9px;
      --shadow:    0 1px 3px rgba(15,23,80,.07), 0 4px 16px rgba(15,23,80,.05);
      --shadow-md: 0 4px 20px rgba(15,23,80,.13);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ━━━ TOPBAR ━━━ */
    .topbar {
      background: var(--navy);
      height: 54px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 400;
      box-shadow: 0 2px 12px rgba(15,23,80,.25);
    }
    .topbar h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar h1::before {
      content: '';
      display: inline-block;
      width: 26px; height: 26px;
      background: linear-gradient(135deg,#60a5fa,#818cf8);
      border-radius: 7px;
      flex-shrink: 0;
    }
    .topbar a.nav-link {
      font-size: 12px;
      font-family: inherit;
      text-decoration: none;
      padding: 6px 13px;
      border-radius: 7px;
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.88);
      font-weight: 500;
      transition: background .15s;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }
    .topbar a.nav-link:hover { background: rgba(255,255,255,.18); }
    .topbar a.nav-link.admin-link {
      background: rgba(251,191,36,.15);
      color: #fbbf24;
      border-color: rgba(251,191,36,.25);
    }
    select {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 7px;
      background: rgba(255,255,255,.10);
      color: #fff;
      cursor: pointer;
      outline: none;
    }
    select option { background: #1e3a8a; color: #fff; }
    .tb-btn {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 13px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 7px;
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.88);
      cursor: pointer;
      font-weight: 500;
      transition: background .15s;
      white-space: nowrap;
    }
    .tb-btn:hover { background: rgba(255,255,255,.18); }
    .tb-btn.danger {
      background: rgba(239,68,68,.15);
      border-color: rgba(239,68,68,.25);
      color: #fca5a5;
    }
    .tb-btn.danger:hover { background: rgba(239,68,68,.25); }
    #userInfo { font-size: 11px; color: rgba(255,255,255,.4); white-space: nowrap; flex-shrink: 0; }

    /* ━━━ LAYOUT ━━━ */
    .main {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ━━━ BASE CARD ━━━ */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* ━━━ CARD HEADER ━━━ */
    .card-head {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--navy);
    }
    .card-head h2 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -.01em;
    }
    .card-head .ch-sub {
      font-size: 11px;
      color: rgba(255,255,255,.45);
    }

    /* ━━━ MONTH ROW ━━━ */
    .months-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      background: var(--surf2);
    }
    .months-lbl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .chip {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 20px;
      background: var(--surf);
      border: 1px solid var(--border2);
      font-size: 11px;
      cursor: pointer;
      color: var(--text2);
      font-weight: 500;
      transition: all .14s;
      user-select: none;
    }
    .chip.on {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
      font-weight: 600;
    }
    .chip:hover:not(.on) { background: var(--surf3); border-color: var(--navy3); color: var(--navy); }
    .chip-action {
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text3);
      cursor: pointer;
      transition: all .14s;
    }
    .chip-action:hover { background: var(--surf3); color: var(--text2); border-color: var(--border2); }

    /* ━━━ KPI METRICS ROW ━━━ */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 14px 16px;
      background: var(--surf2);
      border-bottom: 1px solid var(--border);
    }
    .mc {
      background: var(--surf);
      border-radius: var(--r-sm);
      padding: 13px 15px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: box-shadow .18s;
    }
    .mc:hover { box-shadow: var(--shadow-md); }
    .mc::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #60a5fa, #818cf8);
      border-radius: 3px 0 0 3px;
    }
    .mc.mc-green::after { background: linear-gradient(180deg,#4ade80,#22c55e); }
    .mc.mc-red::after   { background: linear-gradient(180deg,#f87171,#ef4444); }
    .mc.mc-amber::after { background: linear-gradient(180deg,#fbbf24,#f59e0b); }
    .ml { font-size: 10px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
    .mv { font-size: 22px; font-weight: 700; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .ms { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* ━━━ TABLES ━━━ */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: var(--surf2);
      color: var(--text3);
      padding: 9px 13px;
      text-align: left;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: .07em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 9px 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surf2); }

    /* staff card tighter */
    .sc table td  { padding: 7px 10px; }
    .sc table th  { padding: 7px 10px; }

    /* ━━━ PROGRESS BAR ━━━ */
    .bar-wrap { display: flex; align-items: center; gap: 7px; }
    .bar-bg {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--surf3);
      overflow: hidden;
      min-width: 50px;
    }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

    /* ━━━ BADGES ━━━ */
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: .02em;
      display: inline-block;
    }
    .bg { background: var(--red-l);   color: var(--red);   border: 1px solid var(--red-b); }
    .ba { background: var(--amber-l); color: var(--amber); border: 1px solid var(--amber-b); }
    .bn { background: var(--green-l); color: var(--green); border: 1px solid var(--green-b); }
    .bb { background: var(--blue-l);  color: var(--blue);  border: 1px solid var(--blue-b); }

    /* ━━━ TABS ━━━ */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: var(--surf2);
      scrollbar-width: none;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      padding: 12px 18px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
      transition: all .14s;
    }
    .tab.on { border-bottom-color: var(--navy); color: var(--navy); background: var(--surf); font-weight: 600; }
    .tab:hover:not(.on) { background: var(--surf3); color: var(--text2); }
    .tp { display: none; }
    .tp.on { display: block; }

    /* ━━━ STAFF GRID ━━━ */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
      padding: 14px;
    }
    .sc {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .15s;
    }
    .sc:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .sc-head {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 5px;
      background: var(--navy);
    }
    .sc-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: .03em;
    }
    .doj-tag { font-size: 10px; color: rgba(255,255,255,.45); font-weight: 400; }
    .doj-yrs { color: #93c5fd; font-weight: 600; }

    /* ━━━ OUTSTANDING SUB-ROWS ━━━ */
    /* Investment — cool blue */
    tr.out-inv td {
      background: #eff6ff !important;
      border-bottom: 1px dashed #bfdbfe !important;
    }
    /* Gold Loan — warm amber */
    tr.out-gl td {
      background: #fffbeb !important;
      border-bottom: 1px dashed #fde68a !important;
    }
    /* RD — teal */
    tr.out-rd td {
      background: #f0fdfa !important;
      border-bottom: 1px dashed #99f6e4 !important;
    }
    .out-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    .out-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .out-label { font-weight: 500; opacity: .8; }
    .out-amount { font-weight: 700; font-size: 12px; }

    /* ━━━ RANKINGS ━━━ */
    .rank-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      background: var(--surf);
      transition: background .13s;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row:hover { background: var(--surf2); }
    .rnum {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--surf3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border2);
      color: var(--navy2);
    }
    .rnum.gold   { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .rnum.silver { background: #f1f5f9; color: #64748b; border-color: #cbd5e1; }
    .rnum.bronze { background: #fef0e6; color: #9a3412; border-color: #fdba74; }

    /* ━━━ SECTION DIVIDERS ━━━ */
    .sec-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .09em;
      color: var(--text3);
      padding: 8px 16px;
      text-transform: uppercase;
      background: var(--surf2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .sec-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ━━━ CORRECTIVE ACTION CARDS ━━━ */
    .ca-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .ca-card {
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid #e4e4e4;
      box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }
    .ca-card:hover { box-shadow: var(--shadow-md); }
    .ca-head {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,.09);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ca-body { padding: 12px 14px; background: var(--surf); font-size: 12px; color: var(--text2); }
    .ca-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 11px;
      flex-wrap: wrap;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .step {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 7px;
      padding-bottom: 7px;
      border-bottom: 1px dashed var(--border);
    }
    .step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .snum {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ━━━ TREND ━━━ */
    .trend-up { color: var(--green); font-weight: 700; }
    .trend-dn { color: var(--red);   font-weight: 700; }

    /* ━━━ EMPTY / SPINNER ━━━ */
    .empty   { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }
    .spinner { padding: 50px; text-align: center; color: var(--text3); font-size: 14px; }

    /* ━━━ MODAL ━━━ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,16,60,.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surf);
      border-radius: var(--r);
      width: 460px;
      max-width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 24px 64px rgba(15,23,80,.28);
    }
    .modal-head {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--navy);
      border-radius: var(--r) var(--r) 0 0;
    }
    .modal-head h3 { font-size: 13px; font-weight: 600; color: #fff; }
    .mclose {
      background: rgba(255,255,255,.12);
      border: none;
      width: 26px; height: 26px;
      border-radius: 50%;
      color: rgba(255,255,255,.7);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .14s;
    }
    .mclose:hover { background: rgba(255,255,255,.22); color: #fff; }
    .modal-body { padding: 16px 18px; }

    /* ━━━ MODAL OUTSTANDING BLOCK ━━━ */
    .out-block {
      margin-top: 12px;
      padding: 11px 14px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid;
    }
    .out-block.inv { background: #eff6ff; border-color: #bfdbfe; }
    .out-block.gl  { background: #fffbeb; border-color: #fde68a; }
    .out-block.rd  { background: #f0fdfa; border-color: #99f6e4; }
    .out-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .inv .out-icon { background: #dbeafe; }
    .gl  .out-icon { background: #fef3c7; }
    .rd  .out-icon { background: #ccfbf1; }
    .out-lbl  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
    .inv .out-lbl { color: #1e40af; }
    .gl  .out-lbl { color: #92400e; }
    .rd  .out-lbl { color: #0f766e; }
    .out-val  { font-size: 17px; font-weight: 700; }
    .inv .out-val { color: #1e40af; }
    .gl  .out-val  { color: #92400e; }
    .rd  .out-val  { color: #0f766e; }

    /* ━━━ REVIEWED BAR ━━━ */
    #reviewedBar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 300;
      background: var(--navy);
      padding: 11px 18px;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -3px 14px rgba(15,23,80,.22);
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    #reviewedBtn {
      padding: 8px 20px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    #reviewedBtn:hover { opacity: .88; }

    /* ━━━ RESPONSIVE ━━━ */
    @media (max-width: 640px) {
      .topbar { padding: 0 12px; height: 50px; gap: 7px; }
      .topbar h1 { font-size: 13px; }
      .main { padding: 10px 12px; gap: 10px; }
      .metrics-row { grid-template-columns: 1fr 1fr; gap: 9px; padding: 11px 13px; }
      .staff-grid { grid-template-columns: 1fr; padding: 10px; gap: 10px; }
      .ca-grid { grid-template-columns: 1fr; padding: 10px; }
      .tab { padding: 10px 13px; font-size: 11px; }
    }
  </style>
</head>
<body>

<!-- ━━━ TOPBAR ━━━ -->
<div class="topbar">
  <h1>Branch Review Dashboard</h1>
  <a href="staff_dashboard.html" class="nav-link">Staff Productivity</a>
  <span id="adminReportLink" style="display:none">
    <a href="admin_report.html" class="nav-link admin-link">📋 Admin Report</a>
    <a href="#" onclick="openSNLReview();return false;" class="nav-link admin-link">🏢 SNL Review</a>
  </span>
  <select id="branchSel" onchange="onBranch()" style="display:none"></select>
  <select id="modeSel" onchange="onMode()">
    <option value="all">All staff</option>
    <option value="single">Individual</option>
  </select>
  <select id="staffSel" style="display:none" onchange="render()"></select>
  <span id="userInfo"></span>

<script>
/* ── SSO SEED ──
   When this page is opened from another SML dashboard via openSNLReview(),
   it arrives with ?sso=1&brToken=...&brRole=... in the URL.
   Seed localStorage from those params before the SESSION check below runs,
   so the user lands directly on the dashboard without seeing the login page.
   The params are then stripped from the URL for cleanliness.
*/
(function() {
  const p = new URLSearchParams(window.location.search);
  if (p.get("sso") === "1") {
    ["brToken","brRole","brBranch","brName","brEmpId","brLoginDate"].forEach(k => {
      const v = p.get(k);
      if (v) localStorage.setItem(k, v);
    });
    // Clean the URL — replace the current history entry without the params
    const clean = window.location.pathname;
    window.history.replaceState(null, "", clean);
  }
})();

const API      = "https://script.google.com/macros/s/AKfycbzy_um_SLPLkZAEvEjYGKR8N3QYXORaRJBe9_soQSUWhTY1sAhSYev3hWtywxFE3mvQtw/exec";
const AUTH_URL = "https://script.google.com/macros/s/AKfycbzTPB10fdiNYo2mRF_pIsUuPfOhFW02_omSZYCPhPq_ybtVYqz5HWrbB7ia7C4lb5j7-g/exec";

const MONTHS = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const PLABEL = {
  Investment:   "Investment",
  RD:           "Recurring Deposit",
  GoldLoan:     "Gold Loan",
  BusinessLoan: "Business Loan",
  SOLAR:        "Solar",
  Visit:        "Visit"
};

const STEPS = {
  Investment: [
    "Review client portfolio for cross-sell & upsell opportunities",
    "Identify top 10 prospects not yet enrolled in any investment product",
    "Weekly 1:1 coaching session focused on investment pitch skills",
    "Set daily account-opening mini-targets to close the gap"
  ],
  RD: [
    "Focus on salary-account holders not yet enrolled in RD",
    "Run branch-level RD awareness session for walk-in customers",

    "Set daily RD enrollment targets based on remaining gap"
  ],
  GoldLoan: [

  ],

  ],
  SOLAR: [
    "Partner with local solar dealers for inbound referral leads",

    "Align with state subsidy programs to reduce customer cost"
  ],
  Visit: [
    "Increase daily field visit count by at least 2 per day",
    "Prioritise high-potential villages for cluster visits",
    "Log every visit in CRM with next follow-up action",
    "Conduct joint visits with branch manager for key prospects"
  ]
};

/* ── outstanding display config — Investment, GoldLoan, RD all treated the same way ── */
const OUT_CFG = {
  Investment: { rowCls: "out-inv", pip: "#3b82f6", label: "Outstanding",      blockCls: "inv", icon: "📈" },
  GoldLoan:   { rowCls: "out-gl",  pip: "#f59e0b", label: "Outstanding",      blockCls: "gl",  icon: "🏅" },
  RD:         { rowCls: "out-rd",  pip: "#14b8a6", label: "RD Outstanding",   blockCls: "rd",  icon: "🔄" }
};

// ── SESSION ──
const SESSION_TOKEN  = localStorage.getItem("brToken");
const SESSION_ROLE   = localStorage.getItem("brRole");
const SESSION_BRANCH = localStorage.getItem("brBranch");
const SESSION_NAME   = localStorage.getItem("brName");
const SESSION_EMPID  = localStorage.getItem("brEmpId");
const SESSION_DATE   = localStorage.getItem("brLoginDate");

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

if (!SESSION_TOKEN || SESSION_DATE !== todayStr()) {
  window.location.href = "login.html";
}

let selMonths = new Set(["Apr"]);
let branch = null;
let allData = [];

function setupRoleUI() {
  document.getElementById("userInfo").textContent =
    SESSION_NAME + (SESSION_ROLE==="staff" ? " (Staff)" : SESSION_ROLE==="branch" ? " (Branch)" : " (Admin)");
  if (SESSION_ROLE === "admin") {
    document.getElementById("branchSel").style.display = "inline-block";
    document.getElementById("adminReportLink").style.display = "inline";
  }
  if (SESSION_ROLE === "staff") {
    const bar = document.getElementById("reviewedBar");
    bar.style.display = "flex";
    document.querySelector(".main").style.paddingBottom = "70px";
  }
}

const RD_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxcZ5BVpz-jvCQze4msaEqv1uSUTS-Z-mulCPYUU9xvh0_8R4aDoMmOIMclJQbIeeVWAtA9qkyJ8Vv/pub?gid=658458096&single=true&output=csv";

async function fetchRDOutstanding() {
  try {
    const res = await fetch(RD_CSV_URL);
    const text = await res.text();
    const rows = text.split('\n');
    if (rows.length < 2) return {};

    const headers = rows[0].split(',').map(h => h.trim());
    const nameIdx = headers.indexOf('Staff Members');
    const compIdx = headers.indexOf('Company');
    const outIdx  = headers.indexOf('Total Outstanding');

    if (nameIdx === -1 || compIdx === -1 || outIdx === -1) return {};

    const rdMap = {};
    for (let i = 1; i < rows.length; i++) {
      if (!rows[i].trim()) continue;

      // Custom parser to handle quotes and commas inside numbers (e.g., "5,00,000")
      let cols = [];
      let current = "";
      let inQuotes = false;
      for (let char of rows[i]) {
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { cols.push(current); current = ""; }
        else current += char;
      }
      cols.push(current);

      const comp = (cols[compIdx] || "").trim();
      
      // Filter for SML only
      if (comp === "SML") {
        const name = (cols[nameIdx] || "").trim();
        // Remove formatting characters to get a clean float
        const outValStr = (cols[outIdx] || "").replace(/,/g, '').replace(/"/g, '').trim();
        const outVal = parseFloat(outValStr) || 0;
        
        if (name) rdMap[name.toLowerCase()] = outVal;
      }
    }
    return rdMap;
  } catch (e) {
    console.error("Error fetching RD CSV:", e);
    return {};
  }
}

async function load() {
  try {
    const r = await fetch(API + "?token=" + encodeURIComponent(SESSION_TOKEN));
    const j = await r.json();
    if (j.error === "unauthorized") { doLogout(); return; }
    allData = j.branches;

    // ━━━ INJECT RD OUTSTANDING FROM CSV ━━━
    const rdMap = await fetchRDOutstanding();
    allData.forEach(b => {
      (b.staff || []).forEach(s => {
        const sName = s.name.trim().toLowerCase();
        if (rdMap[sName] !== undefined) {
          // Initialize RD object if it doesn't exist for this staff member yet
          if (!s.metrics["RD"]) {
            s.metrics["RD"] = { monthlyAchievement: {}, monthlyTarget: 0 };
          }
          // Set the outstanding value
          s.metrics["RD"].outstanding = rdMap[sName];
        }
      });
    });
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    setupRoleUI();
    if (SESSION_ROLE === "admin") {
      const sel = document.getElementById("branchSel");
      allData.forEach((b, i) => {
        const o = document.createElement("option");
        o.value = i; o.textContent = b.branchName;
        sel.appendChild(o);
      });
    } else {
      allData = allData.filter(b =>
        b.branchName.trim().toLowerCase() === SESSION_BRANCH.trim().toLowerCase()
      );
    }
    buildShell();
    onBranch();
  } catch(e) {
    document.getElementById("loader").textContent = "❌ Could not load data. Check API URL and CORS settings.";
  }
}

function onBranch() {
  const sel = document.getElementById("branchSel");
  const i   = SESSION_ROLE === "admin" ? (sel.value || 0) : 0;
  branch    = allData[i];
  if (!branch) return;
  const ss = document.getElementById("staffSel");
  ss.innerHTML = "";
  (branch.staff || []).forEach(s => {
    const o = document.createElement("option");
    o.value = s.name; o.textContent = s.name;
    ss.appendChild(o);
  });
  render();
}

function doLogout() { localStorage.clear(); window.location.href = "login.html"; }

function openSNLReview() {
  // Pass current session to snlreview.netlify.app via URL params.
  // The SNL site seeds its own localStorage from these params on load, bypassing its login page.
  const p = new URLSearchParams({
    brToken:     localStorage.getItem("brToken")     || "",
    brRole:      localStorage.getItem("brRole")      || "",
    brBranch:    localStorage.getItem("brBranch")    || "",
    brName:      localStorage.getItem("brName")      || "",
    brEmpId:     localStorage.getItem("brEmpId")     || "",
    brLoginDate: localStorage.getItem("brLoginDate") || ""
  });
  window.open("https://snlreview.netlify.app/?sso=1&" + p.toString(), "_blank");
}

async function markReviewed() {
  const btn = document.getElementById("reviewedBtn");
  const msg = document.getElementById("reviewedMsg");
  btn.disabled = true; btn.textContent = "Saving…";
  try {
    const res  = await fetch(AUTH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"markReviewed",token:SESSION_TOKEN}) });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = "✓ Reviewed"; btn.style.background = "#16a34a"; btn.disabled = true;
      msg.textContent = data.alreadyMarked ? "✅ Already marked as reviewed today." : "✅ Marked as reviewed for today. Thank you!";
    } else {
      btn.disabled = false; btn.textContent = "✓ Mark as Reviewed";
      alert(data.error || "Could not save. Try again.");
    }
  } catch(e) { btn.disabled = false; btn.textContent = "✓ Mark as Reviewed"; alert("Network error. Please try again."); }
}

async function checkReviewedStatus() {
  if (SESSION_ROLE !== "staff") return;
  try {
    const res  = await fetch(AUTH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({action:"markReviewed",token:SESSION_TOKEN}) });
    const data = await res.json();
    if (data.ok && data.alreadyMarked) {
      document.getElementById("reviewedBtn").textContent      = "✓ Reviewed";
      document.getElementById("reviewedBtn").style.background = "#16a34a";
      document.getElementById("reviewedBtn").disabled         = true;
      document.getElementById("reviewedMsg").textContent      = "✅ Already marked as reviewed today.";
    }
  } catch(e) {}
}

function getMonths() { return MONTHS.filter(m => selMonths.has(m)); }

function getStaff() {
  const m = document.getElementById("modeSel").value;
  const n = document.getElementById("staffSel").value;
  let list = branch ? branch.staff || [] : [];
  if (m === "single") list = list.filter(s => s.name === n);
  return list;
}

function onMode() {
  const m = document.getElementById("modeSel").value;
  document.getElementById("staffSel").style.display = m === "single" ? "inline-block" : "none";
  render();
}

function calc(metric, months) {
  let ach = 0;
  months.forEach(m => ach += (metric.monthlyAchievement[m] || 0));
  const tgt = (metric.monthlyTarget || 0) * months.length;
  const pct = tgt > 0 ? Math.round(ach / tgt * 100) : 0;
  return { ach, tgt, pct, gap: ach - tgt };
}

function pc(p) { return p >= 100 ? "#16a34a" : p >= 75 ? "#d97706" : "#dc2626"; }
function bc(p) { return p >= 100 ? "bn" : p >= 75 ? "ba" : "bg"; }

function fmt(n) {
  n = Math.round(n);
  const a = Math.abs(n), s = n < 0 ? "-" : "";
  if (a >= 10000000) return s + (a/10000000).toFixed(1) + "Cr";
  if (a >= 100000)   return s + (a/100000).toFixed(1) + "L";
  if (a >= 1000)     return s + (a/1000).toFixed(1) + "K";
  return n.toLocaleString();
}

function initials(name) {
  return (name || "").trim().split(/\s+/).slice(0,2).map(w => w[0]?.toUpperCase() || "").join("");
}

/* ── SHELL ── */
function buildShell() {
  document.getElementById("mainArea").innerHTML = `
    <div class="card">
      <div class="months-row" id="mrow"></div>
    </div>
    <div id="snap"></div>
    <div class="card">
      <div class="tab-row">
        <div class="tab on"  onclick="swTab('staff',this)">Staff Performance</div>
        <div class="tab"     onclick="swTab('rank',this)">Rankings</div>
        <div class="tab"     onclick="swTab('corrective',this)">Corrective Actions</div>
        <div class="tab"     onclick="swTab('trend',this)">Month Trend</div>
      </div>
      <div class="tp on" id="tp-staff"></div>
      <div class="tp"    id="tp-rank"></div>
      <div class="tp"    id="tp-corrective"></div>
      <div class="tp"    id="tp-trend"></div>
    </div>`;
  buildMonthRow();
}

function buildMonthRow() {
  const row = document.getElementById("mrow");
  row.innerHTML = `<span class="months-lbl">Months</span>`;
  MONTHS.forEach(m => {
    const c = document.createElement("span");
    c.className = "chip" + (selMonths.has(m) ? " on" : "");
    c.textContent = m;
    c.onclick = () => {
      if (selMonths.has(m)) { if (selMonths.size > 1) selMonths.delete(m); }
      else selMonths.add(m);
      buildMonthRow(); render();
    };
    row.appendChild(c);
  });
  const ab = document.createElement("button");
  ab.className = "chip-action"; ab.textContent = "All"; ab.style.marginLeft = "6px";
  ab.onclick = () => { MONTHS.forEach(m => selMonths.add(m)); buildMonthRow(); render(); };
  row.appendChild(ab);
  const cb = document.createElement("button");
  cb.className = "chip-action"; cb.textContent = "Clear"; cb.style.marginLeft = "3px";
  cb.onclick = () => {
    const first = selMonths.values().next().value;
    selMonths.clear(); selMonths.add(first);
    buildMonthRow(); render();
  };
  row.appendChild(cb);
}

function swTab(name, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
  document.querySelectorAll(".tp").forEach(p => p.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("tp-" + name).classList.add("on");
}

/* ── RENDER ── */
function render() {
  if (!branch) return;
  const months = getMonths();
  const staff  = getStaff();
  renderSnap(staff, months);
  renderStaff(staff, months);
  renderRank(staff, months);
  renderCorrective(staff, months);
  renderTrend(staff, months);
}

/* ── SNAPSHOT ── */
function renderSnap(staff, months) {
  let totals = {};
  staff.forEach(s => {
    for (let k in s.metrics) {
      if (!totals[k]) totals[k] = { tgt: 0, ach: 0 };
      const metric = s.metrics[k];
      months.forEach(m => { totals[k].ach += (metric.monthlyAchievement[m] || 0); });
      if (k !== "BusinessLoan") { totals[k].tgt += (metric.monthlyTarget || 0) * months.length; }
    }
  });
  if (totals["BusinessLoan"]) {
    const blMonthly = branch.blBranchMonthlyTarget || 0;
    const blAnnual  = branch.blBranchTotalTarget   || 0;
    totals["BusinessLoan"].tgt = blAnnual > 0 ? blAnnual : (blMonthly * months.length);
  }

  const realStaff  = staff.filter(s => s.name.toUpperCase() !== "TOTAL");
  const staffCount = realStaff.length;
  let onTgt = 0, belowProd = 0;
  realStaff.forEach(s => {
    let sa = 0, st = 0;
    for (let k in s.metrics) {
      if (k === "BusinessLoan") continue;
      const metric = s.metrics[k];
      months.forEach(m => { sa += (metric.monthlyAchievement[m] || 0); });
      st += (metric.monthlyTarget || 0) * months.length;
    }
    if (st > 0 && sa >= st) onTgt++;
  });
  for (let k in totals) {
    const p = totals[k].tgt > 0 ? Math.round(totals[k].ach / totals[k].tgt * 100) : 100;
    if (p < 100) belowProd++;
  }

  const mlist = [...selMonths].sort((a,b) => MONTHS.indexOf(a) - MONTHS.indexOf(b)).join(", ");
  let rows = "";
  for (let k in totals) {
    const p = totals[k].tgt > 0 ? Math.round(totals[k].ach / totals[k].tgt * 100) : 0;
    const g = totals[k].ach - totals[k].tgt;
    rows += `<tr>
      <td style="font-weight:600">${PLABEL[k]||k}</td>
      <td>${fmt(totals[k].tgt)}</td>
      <td>${fmt(totals[k].ach)}</td>
      <td><div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(p,100)}%;background:${pc(p)}"></div></div>
        <span class="badge ${bc(p)}" style="min-width:38px;text-align:center">${p}%</span>
      </div></td>
      <td style="color:${g<0?"#dc2626":"#16a34a"};font-weight:700">${g>=0?"+":""}${fmt(g)}</td>
    </tr>`;
  }

  const blPct = totals["BusinessLoan"] ? Math.round(totals["BusinessLoan"].ach/(totals["BusinessLoan"].tgt||1)*100) : 0;

  document.getElementById("snap").innerHTML = `
    <div class="card">
      <div class="card-head">
        <h2>🏢 Branch Snapshot — ${branch.branchName}</h2>
        <span class="ch-sub">${mlist}</span>
      </div>
      <div class="metrics-row">
        <div class="mc ${onTgt===staffCount?"mc-green":"mc-red"}">
          <div class="ml">Staff on Target</div>
          <div class="mv" style="color:${onTgt===staffCount?"#16a34a":"#dc2626"}">${onTgt} / ${staffCount}</div>
          <div class="ms">team members</div>
        </div>
        <div class="mc ${belowProd===0?"mc-green":"mc-amber"}">
          <div class="ml">Products Below Target</div>
          <div class="mv" style="color:${belowProd===0?"#16a34a":"#d97706"}">${belowProd}</div>
          <div class="ms">of ${Object.keys(totals).length} products</div>
        </div>
        <div class="mc ${blPct>=100?"mc-green":blPct>=75?"mc-amber":"mc-red"}">
          <div class="ml">Business Loan</div>
          <div class="mv" style="color:${pc(blPct)}">${blPct}%</div>
          <div class="ms">branch target</div>
        </div>
        <div class="mc">
          <div class="ml">Period</div>
          <div class="mv" style="font-size:18px">${months.length}</div>
          <div class="ms">${months.length===1?"month selected":"months selected"}</div>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Product</th><th>Target</th><th>Achievement</th><th>Progress</th><th>Gap</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

/* ── STAFF TAB ── */
function renderStaff(staff, months) {
  if (!staff.length) { document.getElementById("tp-staff").innerHTML = `<div class="empty">No staff to display.</div>`; return; }
  const mLabel = months.length === 1 ? months[0] : months.join("+");
  let html = `<div class="staff-grid">`;
  staff.forEach(s => {
    let sa = 0, st = 0, rows = "";
    for (let k in s.metrics) {
      const r      = calc(s.metrics[k], months);
      const metric = s.metrics[k];

      if (k === "BusinessLoan") {
        sa += r.ach;
        rows += `<tr>
          <td style="color:var(--text2)">${PLABEL[k]||k}</td>
          <td style="color:var(--text3);font-style:italic;font-size:11px">Branch target</td>
          <td style="cursor:pointer;color:#1d4ed8;text-decoration:underline"
              onclick='openBreak(${JSON.stringify(s.name)},${JSON.stringify(k)},${JSON.stringify(metric)})'>${fmt(r.ach)}</td>
          <td>—</td>
          <td>—</td>
        </tr>`;
      } else {
        sa += r.ach; st += r.tgt;
        const gap = r.gap;
        rows += `<tr>
          <td style="color:var(--text2)">${PLABEL[k]||k}</td>
          <td>${fmt(r.tgt)}</td>
          <td style="cursor:pointer;color:#1d4ed8;text-decoration:underline"
              onclick='openBreak(${JSON.stringify(s.name)},${JSON.stringify(k)},${JSON.stringify(metric)})'>${fmt(r.ach)}</td>
          <td><span class="badge ${bc(r.pct)}">${r.pct}%</span></td>
          <td style="color:${gap<0?"#dc2626":"#16a34a"};font-weight:700">${gap>=0?"+":""}${fmt(gap)}</td>
        </tr>`;

        /* ━━━ OUTSTANDING SUB-ROW — Investment, GoldLoan AND RD ━━━ */
        if (OUT_CFG[k] && metric.outstanding !== null && metric.outstanding !== undefined) {
          const cfg = OUT_CFG[k];
          rows += `<tr class="${cfg.rowCls}">
            <td colspan="2" style="padding-left:22px">
              <span class="out-cell">
                <span class="out-pip" style="background:${cfg.pip}"></span>
                <span class="out-label">↳ ${cfg.label}</span>
              </span>
            </td>
            <td colspan="3">
              <span class="out-amount" style="color:${cfg.pip}">${fmt(metric.outstanding)}</span>
            </td>
          </tr>`;
        }
      }
    }
    const op = st > 0 ? Math.round(sa / st * 100) : 0;
    let dojBadge = "";
    if (s.doj) {
      const parts   = s.doj.split("-");
      const dojDate = new Date(`${parts[1]} ${parts[0]} ${parts[2]}`);
      const diffMs  = Date.now() - dojDate.getTime();
      const yrs     = diffMs / (1000 * 60 * 60 * 24 * 365.25);
      const display = yrs < 1 ? `${Math.round(yrs*12)}m` : `${yrs.toFixed(1)}y`;
      dojBadge = `<span class="doj-tag"> · DOJ: ${s.doj} <span class="doj-yrs">(${display})</span></span>`;
    }
    html += `<div class="sc">
      <div class="sc-head">
        <span class="sc-name">
          <span class="avatar">${initials(s.name)}</span>
          <span>${s.name}${dojBadge}</span>
        </span>
        <span class="badge ${bc(op)}">${op}% — ${mLabel}</span>
      </div>
      <table>
        <thead><tr><th>Product</th><th>Target</th><th>Achieved</th><th>%</th><th>Gap</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("tp-staff").innerHTML = html;
}

/* ── RANKINGS TAB ── */
function renderRank(staff, months) {
  if (!staff.length) { document.getElementById("tp-rank").innerHTML = `<div class="empty">No data.</div>`; return; }
  const scores = staff.map(s => {
    let a = 0, t = 0;
    for (let k in s.metrics) {
      if (k === "BusinessLoan") continue;
      const r = calc(s.metrics[k], months); a += r.ach; t += r.tgt;
    }
    return { name: s.name, ach: a, tgt: t, pct: t > 0 ? Math.round(a/t*100) : 0 };
  }).sort((a,b) => b.pct - a.pct);

  const rnCls = ["gold","silver","bronze"];
  let html = `<div class="sec-label"><span class="sec-dot" style="background:#f59e0b"></span>🏆 Overall Ranking</div>`;
  scores.forEach((s,i) => {
    html += `<div class="rank-row">
      <div class="rnum ${rnCls[i]||""}">${i+1}</div>
      <div style="flex:1;font-weight:600;font-size:12px">${s.name}</div>
      <div class="bar-wrap" style="width:140px">
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(s.pct,100)}%;background:${pc(s.pct)}"></div></div>
      </div>
      <span class="badge ${bc(s.pct)}" style="min-width:38px;text-align:center">${s.pct}%</span>
      <span style="font-size:11px;color:var(--text3);min-width:52px;text-align:right">${fmt(s.ach)}</span>
    </div>`;
  });

  const products = Object.keys(staff[0]?.metrics || {});
  products.forEach(p => {
    html += `<div class="sec-label"><span class="sec-dot" style="background:var(--navy3)"></span>${PLABEL[p]||p}</div>`;
    if (p === "BusinessLoan") {
      const ps = staff.map(s => {
        let ach = 0;
        if (s.metrics[p]) months.forEach(m => ach += (s.metrics[p].monthlyAchievement[m] || 0));
        return { name: s.name, ach };
      }).sort((a,b) => b.ach - a.ach);
      const maxAch = ps[0]?.ach || 1;
      ps.forEach((s,i) => {
        const barW = Math.round(s.ach / maxAch * 100);
        html += `<div class="rank-row">
          <div class="rnum ${rnCls[i]||""}">${i+1}</div>
          <div style="flex:1;font-size:12px">${s.name}</div>
          <div class="bar-wrap" style="width:140px">
            <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:#3b82f6"></div></div>
          </div>
          <span class="badge bb" style="min-width:38px;text-align:center">${fmt(s.ach)}</span>
          <span style="font-size:10px;color:var(--text3);min-width:52px;text-align:right">no indiv. target</span>
        </div>`;
      });
    } else {
      const ps = staff.map(s => {
        const r = s.metrics[p] ? calc(s.metrics[p], months) : {ach:0,tgt:0,pct:0,gap:0};
        return { name: s.name, ...r };
      }).sort((a,b) => b.pct - a.pct);
      ps.forEach((s,i) => {
        html += `<div class="rank-row">
          <div class="rnum ${rnCls[i]||""}">${i+1}</div>
          <div style="flex:1;font-size:12px">${s.name}</div>
          <div class="bar-wrap" style="width:140px">
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(s.pct,100)}%;background:${pc(s.pct)}"></div></div>
          </div>
          <span class="badge ${bc(s.pct)}" style="min-width:38px;text-align:center">${s.pct}%</span>
          <span style="font-size:11px;color:var(--text3);min-width:52px;text-align:right">${fmt(s.ach)}</span>
        </div>`;
      });
    }
  });
  document.getElementById("tp-rank").innerHTML = html;
}

/* ── CORRECTIVE ACTIONS TAB ── */
function renderCorrective(staff, months) {
  let actions = [];
  staff.forEach(s => {
    for (let k in s.metrics) {
      if (k === "BusinessLoan") continue;
      const r = calc(s.metrics[k], months);
      if (r.pct < 100) actions.push({ staff: s.name, product: k, pct: r.pct, ach: r.ach, tgt: r.tgt, gap: r.gap });
    }
  });
  if (branch.blBranchMonthlyTarget || branch.blBranchTotalTarget) {
    const blTgt = branch.blBranchTotalTarget > 0 ? branch.blBranchTotalTarget : (branch.blBranchMonthlyTarget * months.length);
    let blAch = 0;
    staff.forEach(s => { if (s.metrics["BusinessLoan"]) months.forEach(m => blAch += (s.metrics["BusinessLoan"].monthlyAchievement[m]||0)); });
    const blPct = blTgt > 0 ? Math.round(blAch/blTgt*100) : 0;
    if (blPct < 100) actions.push({ staff:"BRANCH (Business Loan)", product:"BusinessLoan", pct:blPct, ach:blAch, tgt:blTgt, gap:blAch-blTgt });
  }
  actions.sort((a,b) => a.pct - b.pct);
  if (!actions.length) {
    document.getElementById("tp-corrective").innerHTML = `<div class="empty">✅ All staff on target — outstanding performance!</div>`;
    return;
  }
  const crit = actions.filter(a => a.pct < 50);
  const risk = actions.filter(a => a.pct >= 50 && a.pct < 75);
  const near = actions.filter(a => a.pct >= 75 && a.pct < 100);

  function caCard(a, bg, tc, bc2) {
    const steps = STEPS[a.product] || ["Deep-dive review of pipeline with staff member","Set daily activity targets to close the gap","Monitor progress every 3 days","Escalate to manager if no improvement in 7 days"];
    const label = PLABEL[a.product] || a.product;
    const stepsHTML = steps.map((st,i) => `<div class="step"><div class="snum">${i+1}</div><div>${st}</div></div>`).join("");
    return `<div class="ca-card" style="border-color:${bc2}">
      <div class="ca-head" style="background:${bg};color:${tc};border-bottom-color:${bc2}">
        <span>${a.staff} — ${label}</span>
        <span class="badge" style="background:rgba(0,0,0,0.12);color:${tc}">${a.pct}%</span>
      </div>
      <div class="ca-body">
        <div class="ca-stats">
          <span>Target: <b style="color:#222">${fmt(a.tgt)}</b></span>
          <span>Done: <b style="color:#222">${fmt(a.ach)}</b></span>
          <span>Gap: <b style="color:${tc}">${fmt(Math.abs(a.gap))}</b></span>
        </div>
        ${stepsHTML}
      </div>
    </div>`;
  }

  let html = "";
  if (crit.length) {
    html += `<div class="sec-label"><span class="sec-dot" style="background:#dc2626"></span>🔴 Critical — Below 50% (${crit.length} items)</div><div class="ca-grid">`;
    crit.forEach(a => html += caCard(a,"#fee2e2","#991b1b","#fca5a5")); html += `</div>`;
  }
  if (risk.length) {
    html += `<div class="sec-label"><span class="sec-dot" style="background:#d97706"></span>🟡 At Risk — 50–75% (${risk.length} items)</div><div class="ca-grid">`;
    risk.forEach(a => html += caCard(a,"#fef3c7","#92400e","#fcd34d")); html += `</div>`;
  }
  if (near.length) {
    html += `<div class="sec-label"><span class="sec-dot" style="background:#16a34a"></span>🟢 Near Target — 75–99% (${near.length} items)</div><div class="ca-grid">`;
    near.forEach(a => html += caCard(a,"#dcfce7","#166534","#86efac")); html += `</div>`;
  }
  document.getElementById("tp-corrective").innerHTML = html;
}

/* ── MONTH TREND TAB ── */
function renderTrend(staff, months) {
  if (!staff.length) { document.getElementById("tp-trend").innerHTML = `<div class="empty">No data.</div>`; return; }
  let html = "";
  staff.forEach(s => {
    const products = Object.keys(s.metrics || {});
    if (!products.length) return;
    html += `<div class="sec-label"><span class="sec-dot" style="background:var(--navy)"></span>👤 ${s.name}</div>`;
    html += `<div style="overflow-x:auto"><table><thead><tr><th>Product</th>`;
    MONTHS.forEach(m => html += `<th style="${selMonths.has(m) ? "border-bottom:2px solid #3b82f6" : "opacity:0.4"}">${m}</th>`);
    html += `<th>Selected Total</th></tr></thead><tbody>`;
    products.forEach(p => {
      if (!s.metrics[p]) return;
      const ma = s.metrics[p].monthlyAchievement;
      const mt = s.metrics[p].monthlyTarget || 0;
      let total = 0, cells = "", prev = null;
      MONTHS.forEach(m => {
        const v = ma[m] || 0;
        if (selMonths.has(m)) total += v;
        let arrow = "";
        if (prev !== null) {
          arrow = v > prev ? `<span class="trend-up"> ↑</span>` : v < prev ? `<span class="trend-dn"> ↓</span>` : `<span style="color:#ccc"> —</span>`;
        }
        const dim = !selMonths.has(m) ? "opacity:0.3;" : "";
        const hi  = mt > 0 && v >= mt ? "background:#f0fdf4;" : "";
        cells += `<td style="${dim}${hi}">${v}${arrow}</td>`;
        prev = v;
      });
      const productLabel = p === "BusinessLoan"
        ? `<span>${PLABEL[p]}</span> <span style="font-size:10px;color:var(--text3);font-style:italic">branch</span>`
        : PLABEL[p] || p;
      html += `<tr>
        <td style="font-weight:600;white-space:nowrap">${productLabel}</td>
        ${cells}
        <td style="font-weight:700;color:var(--navy)">${fmt(total)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  document.getElementById("tp-trend").innerHTML = html;
}

/* ── BREAKDOWN MODAL ── */
function openBreak(sname, pkey, metric) {
  document.getElementById("modalTitle").textContent = sname + " — " + (PLABEL[pkey]||pkey);
  const months = getMonths();
  const r  = calc(metric, months);
  const mt = metric.monthlyTarget || 0;
  let rows = MONTHS.map((m, idx) => {
    const v   = metric.monthlyAchievement[m] || 0;
    const p   = mt > 0 ? Math.round(v/mt*100) : 0;
    const sel = selMonths.has(m);
    let arrow = "";
    if (idx > 0) {
      const pv = metric.monthlyAchievement[MONTHS[idx-1]] || 0;
      arrow = v > pv ? `<span class="trend-up">↑</span>` : v < pv ? `<span class="trend-dn">↓</span>` : `<span style="color:#ccc">—</span>`;
    }
    return `<tr style="${!sel?"opacity:0.35":""}">
      <td>${m}${sel ? ` <span class="badge bb" style="font-size:9px">selected</span>` : ""}</td>
      <td>${v} ${arrow}</td>
      <td><div class="bar-wrap"><div class="bar-bg" style="min-width:80px"><div class="bar-fill" style="width:${Math.min(p,100)}%;background:${pc(p)}"></div></div></div></td>
      <td><span class="badge ${bc(p)}">${p}%</span></td>
    </tr>`;
  }).join("");

  /* ━━━ OUTSTANDING BLOCK — Investment, GoldLoan AND RD ━━━ */
  let outstandingHTML = "";
  if (OUT_CFG[pkey] && metric.outstanding !== null && metric.outstanding !== undefined) {
    const cfg = OUT_CFG[pkey];
    outstandingHTML = `
      <div class="out-block ${cfg.blockCls}">
        <div class="out-icon">${cfg.icon}</div>
        <div>
          <div class="out-lbl">${cfg.label}</div>
          <div class="out-val">${fmt(metric.outstanding)}</div>
        </div>
      </div>`;
  }

  document.getElementById("modalBody").innerHTML = `
    <div style="margin-bottom:10px;font-size:12px;color:var(--text3)">Monthly target: <b style="color:var(--text)">${fmt(mt)}</b></div>
    <table style="font-size:12px">
      <thead><tr><th>Month</th><th>Achievement</th><th>vs Target</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
      <span>Selected total: <b>${fmt(r.ach)}</b></span>
      <span>Target: <b>${fmt(r.tgt)}</b></span>
      <span style="color:${pc(r.pct)};font-weight:700">${r.pct}%</span>
    </div>
    ${outstandingHTML}`;
  document.getElementById("overlay").classList.add("open");
}

function maybeClose(e) { if (e.target === document.getElementById("overlay")) closeModal(); }
function closeModal()   { document.getElementById("overlay").classList.remove("open"); }

/* ── EXPORT ── */
function doExport() {
  if (!branch) return;
  const months = getMonths();
  const staff  = getStaff();

  /* ━━━ HELPERS ━━━ */
  const MONEY_PRODUCTS = new Set(["Investment","RD","GoldLoan","BusinessLoan"]);
  const lastMonth      = months[months.length - 1];
  const YTD_MONTHS     = MONTHS.slice(0, MONTHS.indexOf(lastMonth) + 1);

  const PLABEL_SHORT = {
    Investment:   "Investment",
    RD:           "RD",
    GoldLoan:     "Gold Loan",
    BusinessLoan: "Bus. Loan",
    SOLAR:        "Solar",
    Visit:        "Visit"
  };

  function exact(n) { return Math.round(n); }

  function dispVal(n, key) {
    n = exact(n);
    if (!MONEY_PRODUCTS.has(key)) return String(n);
    const sign = n < 0 ? "−" : "";
    const abs  = Math.abs(n);
    return sign + "" + abs.toLocaleString('en-IN');
  }

  function dispShortfall(n, key) {
    const v = dispVal(n, key);
    const num = exact(n);
    if (num === 0) return `<span class="flat">${v}</span>`;
    return num < 0 ? `<span class="neg">${v}</span>` : `<span class="pos">+${v.replace(/^₹/,"")}</span>`;
  }

  function calcYTD(metric) {
    let ytdAch = 0;
    YTD_MONTHS.forEach(m => ytdAch += (metric.monthlyAchievement[m] || 0));
    const ytdTgt = (metric.monthlyTarget || 0) * YTD_MONTHS.length;
    return { ytdAch: exact(ytdAch), ytdTgt: exact(ytdTgt), shortfall: exact(ytdAch - ytdTgt) };
  }

  /* ━━━ AGGREGATE BRANCH TOTALS ━━━ */
  let totals = {};
  staff.forEach(s => {
    for (let k in s.metrics) {
      if (!totals[k]) totals[k] = { ach:0, tgt:0, ytdAch:0, ytdTgt:0 };
      const r   = calc(s.metrics[k], months);
      const ytd = calcYTD(s.metrics[k]);
      totals[k].ach    += exact(r.ach);
      totals[k].ytdAch += ytd.ytdAch;
      if (k !== "BusinessLoan") { totals[k].tgt += exact(r.tgt); totals[k].ytdTgt += ytd.ytdTgt; }
    }
  });
  if (totals["BusinessLoan"]) {
    const blM = branch.blBranchMonthlyTarget || 0;
    const blA = branch.blBranchTotalTarget   || 0;
    totals["BusinessLoan"].ytdTgt = blA > 0 ? exact(blA) : exact(blM * YTD_MONTHS.length);
  }

  /* ━━━ BUILD HTML ━━━ */
  const gen   = new Date().toLocaleString();
  
  // This variable holds the name of the selected month(s) (e.g. "Jun" or "Apr-Jun")
  const pname = months.length === 1 ? months[0] : months.join("–");

  // ── Branch summary rows ──
  const summaryRows = Object.keys(totals).map(k => {
    const isBL = k === "BusinessLoan";
    const tgt  = isBL ? '<i class="mu">branch</i>' : dispVal(totals[k].tgt, k);
    const ach  = dispVal(totals[k].ach, k);
    const sf   = isBL ? '<i class="mu">—</i>' : dispShortfall(totals[k].ytdAch - totals[k].ytdTgt, k);
    return `<tr><td class="lc">${PLABEL_SHORT[k]||k}${isBL?' <i class="mu">br</i>':""}</td><td>${tgt}</td><td>${ach}</td><td>${sf}</td></tr>`;
  }).join("");

  const trendTHs = YTD_MONTHS.map(m => `<th class="tc">${m}</th>`).join("");

  function buildCombinedRows(s) {
    return Object.keys(s.metrics).map(k => {
      const metric = s.metrics[k];
      const r      = calc(metric, months);
      const ytd    = calcYTD(metric);
      const isBL   = k === "BusinessLoan";
      const ma     = metric.monthlyAchievement || {};
      const mt     = metric.monthlyTarget || 0;

      const tgt   = isBL ? '<i class="mu">br</i>' : dispVal(exact(r.tgt), k);
      const ach   = dispVal(exact(r.ach), k);
      const sf    = isBL ? '<span class="mu">—</span>' : dispShortfall(ytd.shortfall, k);
      
      const outst = (metric.outstanding !== null && metric.outstanding !== undefined)
                      ? dispVal(exact(metric.outstanding), k) 
                      : '<span class="mu">—</span>';

      const trendTDs = YTD_MONTHS.map(m => {
        const v = exact(ma[m] || 0);
        const hi = mt > 0 && v >= mt ? " hit" : "";
        return `<td class="tc${hi}">${dispVal(v,k)}</td>`;
      }).join("");

      return `<tr><td class="lc">${PLABEL_SHORT[k]||k}${isBL?' <i class="mu">br</i>':""}</td><td class="tc">${outst}</td><td>${tgt}</td><td>${ach}</td><td>${sf}</td>${trendTDs}</tr>`;
    }).join("");
  }

  const staffHTML = staff.map(s => {
    // Inject DOJ calculation 
    let dojText = "";
    if (s.doj) {
      const parts   = s.doj.split("-");
      const dojDate = new Date(`${parts[1]} ${parts[0]} ${parts[2]}`);
      const diffMs  = Date.now() - dojDate.getTime();
      const yrs     = diffMs / (1000 * 60 * 60 * 24 * 365.25);
      const display = yrs < 1 ? `${Math.round(yrs*12)}m` : `${yrs.toFixed(1)}y`;
      dojText = ` <span style="font-size:10.5px;font-weight:normal;color:#444">· DOJ: ${s.doj} (${display})</span>`;
    }

    return `<div class="sb">
  <div class="sh"><span class="sn">${s.name}${dojText}</span></div>
  <table><thead><tr>
    <th class="lc">Product</th>
    <th class="tc">Outstanding</th>
    <th>Target (${pname})</th>
    <th>Achieved (${pname})</th>
    <th>Short Fall from April</th>
    ${trendTHs}
  </tr></thead><tbody>${buildCombinedRows(s)}</tbody></table>
</div>`;
  }).join("");

  /* ━━━ HTML DOCUMENT ━━━ */
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review — ${branch.branchName} — ${pname}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:10.5px;color:#000;padding:4mm 5mm}

/* ── page header ── */
.ph{display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid #000;padding-bottom:4px;margin-bottom:6px}
.ph-l h1{font-size:14px;font-weight:700;color:#000;line-height:1.1}
.ph-l p{font-size:9px;color:#000;margin-top:2px}
.ph-r{text-align:right;font-size:9px;color:#000}
.ph-r b{font-size:11px;color:#000;display:block}

/* ── section label ── */
.sl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:#000;padding:4px 5px;margin-bottom:0; width: 100%; border: 1px solid #000; border-bottom: none;}

/* ── shared table styles ── */
table{border-collapse:collapse;font-size:10.5px;table-layout:auto; width: 100%; border: 1px solid #000;}
th{color:#000;padding:3px 4px;font-size:9px;font-weight:700;
   letter-spacing:.02em;text-transform:uppercase;border:1px solid #000;
   text-align:right;vertical-align:bottom;white-space:nowrap;line-height:1.1}
td{padding:3px 4px;border:1px solid #000;vertical-align:middle;text-align:right;white-space:nowrap;color:#000;}

td.lc,th.lc{text-align:left;font-weight:600;}
td.tc,th.tc{text-align:center;}
td.hit{font-weight:bold;}

/* ── branch summary ── */
.bsw{margin-bottom:6px;border:none; width: 100%;}
.fn{font-size:9px;color:#000;padding:3px 4px;border:1px solid #000; border-top:none;}

/* ── staff blocks ── */
.sb{border:1px solid #000;margin-bottom:6px;page-break-inside:avoid;overflow:hidden; width: 100%;}
.sh{border-bottom:1px solid #000; padding:4px 6px;display:flex;justify-content:space-between;align-items:center}
.sn{font-size:12px;font-weight:700;color:#000}

/* ── colour classes (converted to B&W) ── */
.pos, .neg, .up, .dn{color:#000;font-weight:700}
.flat{color:#000}
.mu{color:#000;font-style:italic}

/* ── print ── */
@media print{
  body{padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sb{page-break-inside:avoid}
  @page{size:A4 portrait;margin:5mm}
}
</style>
</head>
<body>

<div class="ph">
  <div class="ph-l">
    <h1>Branch Review — ${branch.branchName}</h1>
    <p>Generated: ${gen} &nbsp;·&nbsp; YTD Gap = YTD Achieved (Apr–${lastMonth}) minus YTD Target &nbsp;·&nbsp; Bold cell = hit monthly target</p>
  </div>
  <div class="ph-r"><span>Period</span><b>${pname}</b><span>YTD: Apr–${lastMonth}</span></div>
</div>

<div class="sl">Branch Summary</div>
<div class="bsw">
  <table>
    <thead><tr>
      <th class="lc">Product</th>
      <th>Target (${pname})</th>
      <th>Achieved (${pname})</th>
      <th>Short Fall from April</th>
    </tr></thead>
    <tbody>${summaryRows}</tbody>
  </table>
  <div class="fn">* Business Loan target is set at branch level, not per staff member.</div>
</div>

<div class="sl">Staff Details &amp; Monthly Trends (Apr – ${lastMonth})</div>
${staffHTML}

</body></html>`;

  const blob = new Blob([html], {type:"text/html"});
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, "_blank");
  if (win) win.onload = () => setTimeout(() => URL.revokeObjectURL(url), 5000);
}
